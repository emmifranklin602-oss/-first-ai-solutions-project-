<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Face Verification</title>
<style>
  body { font-family: Arial, sans-serif; background: #f2f2f2; margin: 0; padding: 20px; }
  h1 { text-align: center; }
  .tab { margin-bottom: 20px; text-align: center; }
  button { font-size: 1.2em; padding: 10px 20px; margin: 5px; cursor: pointer; }
  video, canvas { display: block; margin: 0 auto; border: 2px solid #444; border-radius: 8px; }
  #result { text-align: center; font-size: 1.2em; margin-top: 15px; }
  .section { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
</style>
</head>
<body>

<h1>AI Face Verification</h1>

<div class="section">
  <h2>Live Camera Detection</h2>
  <div class="tab">
    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="overlay" width="640" height="480"></canvas><br>
    <button onclick="startCamera()">Start Camera</button>
    <button onclick="stopCamera()">Stop Camera</button>
  </div>
</div>

<div class="section">
  <h2>Upload Selfie</h2>
  <input type="file" id="selfie" accept="image/*" />
  <button onclick="verifyFace()">Verify Face</button>
  <p id="result">No selfie uploaded yet.</p>
</div>

<!-- Face API models -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script>
const BACKEND = "https://first-ai-solutions-project.up.railway.app/api/py"; // <--- Railway backend URL inserted

// ------------------ Webcam Face Detection ------------------
let video = document.getElementById('video');
let overlay = document.getElementById('overlay');
let canvasCtx = overlay.getContext('2d');
let stream;

async function startCamera() {
  await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
  await faceapi.nets.faceExpressionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');

  stream = await navigator.mediaDevices.getUserMedia({ video: {} });
  video.srcObject = stream;

  video.addEventListener('play', () => {
    const displaySize = { width: video.width, height: video.height };
    faceapi.matchDimensions(overlay, displaySize);
    const interval = setInterval(async () => {
      const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
      canvasCtx.clearRect(0, 0, overlay.width, overlay.height);
      detections.forEach(det => {
        const box = det.detection.box;
        canvasCtx.strokeStyle = "green";
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeRect(box.x, box.y, box.width, box.height);
        const expr = Object.entries(det.expressions).sort((a,b)=>b[1]-a[1])[0];
        canvasCtx.fillStyle = "green";
        canvasCtx.font = "16px Arial";
        canvasCtx.fillText(expr[0]+" "+Math.round(expr[1]*100)+"%", box.x, box.y-5);
      });
    }, 100);
  });
}

function stopCamera() {
  if(stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

// ------------------ Upload Selfie Verification ------------------
async function verifyFace() {
  const file = document.getElementById("selfie").files[0];
  if (!file) return alert("Please select a selfie first.");
  const form = new FormData();
  form.append("file", file);
  document.getElementById("result").textContent = "Verifying...";
  
  try {
    const res = await fetch(`${BACKEND}/verify-face`, { method: "POST", body: form });
    const data = await res.json();
    document.getElementById("result").textContent = 
      `Verified: ${data.verified} — Confidence: ${(data.confidence * 100).toFixed(0)}%`;
  } catch (err) {
    console.error(err);
    document.getElementById("result").textContent = "Error connecting to backend.";
  }
}
</script>

</body>
</html>
