<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Face Verification</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
    h1 { margin-bottom: 10px; }
    #camera, #upload { margin: 20px 0; }
    video, canvas { border: 1px solid #ccc; width: 640px; height: 480px; }
    button { font-size: 18px; padding: 10px 20px; margin: 10px; }
    input[type=file] { font-size: 18px; margin: 10px 0; }
    #result { font-size: 20px; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>AI Face Verification</h1>

  <!-- Live Camera -->
  <div id="camera">
    <h2>Live Camera</h2>
    <video id="video" autoplay muted></video>
    <canvas id="overlay"></canvas><br>
    <button onclick="startCamera()">Start Camera</button>
  </div>

  <!-- Upload Selfie -->
  <div id="upload">
    <h2>Upload Selfie</h2>
    <input type="file" id="selfie" accept="image/*" />
    <button onclick="verifyFace()">Verify Face</button>
    <p id="result"></p>
  </div>

  <!-- Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
  <script>
    // ======= Backend URL =======
    const BACKEND = "https://first-ai-solutions-project-production.up.railway.app/api/py";

    // ======= Upload Selfie Function =======
    async function verifyFace() {
      const file = document.getElementById("selfie").files[0];
      if (!file) return alert("Please select a selfie first.");
      const form = new FormData();
      form.append("file", file);
      try {
        const res = await fetch(`${BACKEND}/verify-face`, { method: "POST", body: form });
        const data = await res.json();
        document.getElementById("result").textContent =
          `Verified: ${data.verified} — Confidence: ${(data.confidence*100).toFixed(0)}%`;
      } catch(err) {
        document.getElementById("result").textContent = "Error connecting to backend.";
        console.error(err);
      }
    }

    // ======= Live Camera Setup =======
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    async function startCamera() {
      await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/weights/');
      await faceapi.nets.faceExpressionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/weights/');
      navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera access denied."));
      video.addEventListener('play', () => {
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);
        setInterval(async () => {
          const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const resized = faceapi.resizeResults(detections, displaySize);
          resized.forEach(d => {
            ctx.strokeStyle = 'green';
            ctx.lineWidth = 3;
            ctx.strokeRect(d.detection.box.x, d.detection.box.y, d.detection.box.width, d.detection.box.height);
            const exp = Object.entries(d.expressions).sort((a,b)=>b[1]-a[1])[0];
            ctx.fillStyle = 'green';
            ctx.font = "18px Arial";
            ctx.fillText(`${exp[0]} ${(exp[1]*100).toFixed(0)}%`, d.detection.box.x, d.detection.box.y - 5);
          });
        }, 200);
      });
    }
  </script>
</body>
</html>
